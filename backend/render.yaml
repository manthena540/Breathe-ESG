services:
  - type: web
    name: breathe-esg-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py seed
    startCommand: gunicorn breathe_esg.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: breathe-esg-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://breathe-esg.onrender.com
